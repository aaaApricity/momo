# 二值化阈值
threshold: 150.0
# 灯条角度误差最大值（度）
max_angle_error: 45.0
# 灯条长宽比最小值/最大值
min_lightbar_ratio: 1.5
max_lightbar_ratio: 20.0
# 灯条最小长度
min_lightbar_length: 8.0
# 装甲板长宽比最小值/最大值
min_armor_ratio: 1.0
max_armor_ratio: 5.0
# 装甲板侧边比例最大值
max_side_ratio: 1.5
# 装甲板矩形误差最大值（度）
max_rectangular_error: 25.0
# 分类置信度最小值
min_confidence: 0.8
# ONNX分类模型路径（暂时填空，后续替换为实际模型）
classify_model: "models/armor_classifier.onnx"
